<!DOCTYPE html>
<html lang="zh-CN" data-o-theme="e.light">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenDesign Token · Vue SPA</title>
    <!-- 防闪烁：在 JS 加载前根据 localStorage / 系统偏好设置 data-o-theme -->
    <!-- ⚠ 值须与 src/stores/theme.ts 常量保持一致：THEME_STORAGE_KEY / MODE_LIGHT / MODE_DARK / OPENDESIGN_COMMUNITY / DATA_THEME_ATTR -->
    <script>
      ;(function () {
        try {
          var m = localStorage.getItem('opendesign-mode')
          var v =
            m && m !== 'null'
              ? m
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
          document.documentElement.setAttribute('data-o-theme', 'e.' + v)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
